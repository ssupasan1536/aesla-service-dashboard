        <div className="kc"><div className="lbl">Active Tickets</div><div className="val" style={{color:"#60a5fa"}}>{open}</div><div className="sub" style={{color:"#f87171"}}>{crit} สูง/วิกฤต</div></div>
        <div className="kc"><div className="lbl">เครื่องออนไลน์</div><div className="val" style={{color:"#4ade80"}}>{green}/{total}</div><div className="sub" style={{color:"#f87171"}}>{red} เครื่องหยุด</div></div>
        <div className="kc"><div className="lbl">Fleet Health</div><div className="val" style={{color:"#a78bfa"}}>{hp}%</div><div className="sub" style={{color:"#fbbf24"}}>{yellow} ติดตาม</div></div>
        <div className="kc"><div className="lbl">ช่างเทคนิค</div><div className="val" style={{color:"#38bdf8"}}>8</div><div className="sub">คน · Avg {Math.round(TECHS.reduce((a,t)=>a+t.util,0)/TECHS.length)}% util</div></div>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div className="ch"><h3>Revenue YTD 2026</h3><span style={{fontSize:11,color:"#4ade80",fontWeight:700}}>฿{Fmt(totalRev)}</span></div>
        <div style={{padding:"12px 16px"}}>
          <div className="g3" style={{marginBottom:12}}>
            {[{lbl:"Service Revenue",val:REVENUE.service.total,color:"#60a5fa"},{lbl:"Parts Revenue",val:REVENUE.parts.total,color:"#f59e0b"},{lbl:"Consumables",val:REVENUE.consumables.total,color:"#a78bfa"}].map(r=>(
              <div key={r.lbl} style={{background:"#111827",borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:10,color:"#64748b",marginBottom:4}}>{r.lbl}</div>
                <div style={{fontSize:16,fontWeight:700,color:r.color}}>฿{Fmt(r.val)}</div>
                <div className="rev-bar" style={{marginTop:6}}><div className="rev-bar-f" style={{width:`${Math.round((r.val/totalRev)*100)}%`,background:r.color}}/></div>
              </div>
            ))}
          </div>
          <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>Parts revenue by month (฿)</div>
          <div style={{display:"flex",gap:4,alignItems:"flex-end",height:48}}>
            {REVENUE.parts.months.map((v,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <div style={{width:"100%",background:v>0?"#f59e0b":"#1e293b",borderRadius:"2px 2px 0 0",height:v>0?`${Math.round((v/maxRev)*44)+4}px`:"4px"}}/>
              <span style={{fontSize:9,color:i===4?"#fbbf24":"#334155"}}>{MONTHS[i]}</span>
            </div>))}
          </div>
        </div>
      </div>
      <div className="g2">
        <div className="card">
          <div className="ch"><h3>Workload ช่างเทคนิค</h3></div>
          <div style={{padding:"10px 14px"}}>
            {TECHS.map(t=>(<div key={t.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"#1d3557",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#60a5fa",flexShrink:0}}>{t.av}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:11,color:"#e2e8f0",fontWeight:600}}>{t.nick} <span style={{fontWeight:400,color:"#64748b"}}>({t.name})</span></span>
                  <span style={{fontSize:10,color:"#64748b"}}>{t.tickets} งาน</span>
                </div>
                <MBar pct={t.util} color={t.util>=90?"#ef4444":t.util>=75?"#f59e0b":"#22c55e"}/>
              </div>
            </div>))}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div className="card">
            <div className="ch"><h3>Machine Health</h3></div>
            <div style={{padding:"10px 14px",display:"flex",gap:14,alignItems:"center"}}>
              <div style={{position:"relative",width:80,height:80,flexShrink:0}}>
                <svg viewBox="0 0 36 36" style={{transform:"rotate(-90deg)",width:80,height:80}}>
                  <circle cx="18" cy="18" r="13" fill="none" stroke="#1e293b" strokeWidth="4"/>
                  <circle cx="18" cy="18" r="13" fill="none" stroke="#22c55e" strokeWidth="4" strokeDasharray={`${(green/total)*82} 82`}/>
                  <circle cx="18" cy="18" r="13" fill="none" stroke="#eab308" strokeWidth="4" strokeDasharray={`${(yellow/total)*82} 82`} strokeDashoffset={`-${(green/total)*82}`}/>
                  <circle cx="18" cy="18" r="13" fill="none" stroke="#ef4444" strokeWidth="4" strokeDasharray={`${(red/total)*82} 82`} strokeDashoffset={`-${((green+yellow)/total)*82}`}/>
                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
                  <span style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>{hp}%</span>
                  <span style={{fontSize:8,color:"#64748b"}}>OK</span>
                </div>
              </div>
              <div style={{flex:1}}>
                {[{l:"ปกติ",n:green,c:"#22c55e"},{l:"ติดตาม",n:yellow,c:"#eab308"},{l:"หยุดซ่อม",n:red,c:"#ef4444"}].map(x=>(<div key={x.l} style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <span className="dot" style={{background:x.c}}/><span style={{fontSize:11,color:"#94a3b8",flex:1}}>{x.l}</span><span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{x.n}</span>
                </div>))}
              </div>
            </div>
          </div>
          <div className="card">
            <div className="ch"><h3>PM นัดหมาย พ.ค. 69</h3></div>
            <div style={{padding:"8px 14px"}}>
              {PM_MAY.map((p,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",paddingBottom:7,marginBottom:7,borderBottom:"1px solid #1e293b"}}>
                <div><div style={{fontSize:11,fontWeight:600,color:"#e2e8f0"}}>{p.clinic}</div><div style={{fontSize:10,color:"#64748b"}}>{p.product} · {p.city}</div></div>
                <span style={{fontSize:10,fontWeight:700,color:"#fbbf24",flexShrink:0,marginLeft:8}}>{p.pmDate}</span>
              </div>))}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function Machines(){
  const [f,setF]=useState("all"),[q,setQ]=useState("");
  const list=MACHINES.filter(m=>(f==="all"||m.status===f)&&(q===""||[m.name,m.customer,m.city,m.brand].some(v=>v.toLowerCase().includes(q.toLowerCase()))));
  const brandCount={};MACHINES.forEach(m=>{brandCount[m.brand]=(brandCount[m.brand]||0)+1;});
  return(<div>
    <div className="ph"><h2>Machine Inventory & Status</h2><p>เครื่องที่ Deploy ทั้งหมด {MACHINES.length} เครื่อง · ข้อมูลจาก Service Package Report.xlsx</p></div>
    <div className="ca">
      <div className="g4" style={{marginBottom:12}}>
        {[{l:"ทั้งหมด",v:MACHINES.length,c:"#60a5fa",s:"all"},{l:"🟢 ปกติ",v:MACHINES.filter(m=>m.status==="green").length,c:"#4ade80",s:"green"},{l:"🟡 ติดตาม",v:MACHINES.filter(m=>m.status==="yellow").length,c:"#fbbf24",s:"yellow"},{l:"🔴 หยุดซ่อม",v:MACHINES.filter(m=>m.status==="red").length,c:"#f87171",s:"red"}].map(k=>(
          <div key={k.l} className="kc" style={{cursor:"pointer"}} onClick={()=>setF(k.s)}><div className="lbl">{k.l}</div><div className="val" style={{color:k.c,fontSize:22}}>{k.v}</div></div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        {Object.entries(brandCount).map(([b,n])=>(<span key={b} className="badge bb" style={{fontSize:11}}>{b} <strong style={{marginLeft:3}}>{n}</strong></span>))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <input className="fi" style={{maxWidth:260,flex:"none"}} placeholder="ค้นหา เครื่อง / ลูกค้า / เมือง / แบรนด์..." value={q} onChange={e=>setQ(e.target.value)}/>
        {["all","green","yellow","red"].map(s=>(<button key={s} className={`btn ${f===s?"btn-p":"btn-g"}`} onClick={()=>setF(s)}>{s==="all"?"ทั้งหมด":s==="green"?"🟢 ปกติ":s==="yellow"?"🟡 ติดตาม":"🔴 หยุดซ่อม"}</button>))}
      </div>
      <div className="card" style={{overflowX:"auto"}}>
        <table>
          <thead><tr><th>Serial No.</th><th>ชื่อเครื่อง</th><th>Brand</th><th>ชื่อลูกค้า / คลินิก</th><th>สาขา</th><th>จังหวัด</th><th>สถานะ</th><th>ติดตั้ง</th><th>สิ้นสุดสัญญา</th><th>Remark</th></tr></thead>
          <tbody>{list.map(m=>(<tr key={m.id}>
            <td><span style={{fontFamily:"monospace",fontSize:11,color:"#60a5fa"}}>{m.sn}</span></td>
            <td style={{fontWeight:600,color:"#e2e8f0"}}>{m.name}</td>
            <td><Bdg type="purple" lbl={m.brand}/></td>
            <td style={{color:"#94a3b8"}}>{m.customer}</td>
            <td style={{fontSize:11}}>{m.branch}</td>
            <td style={{fontSize:11}}>{m.city}</td>
            <td><SttBdg s={m.status}/></td>
            <td style={{fontSize:11,color:"#64748b"}}>{m.install}</td>
            <td style={{fontSize:11,color:"#fbbf24"}}>{m.endDate}</td>
            <td style={{fontSize:10,color:"#475569"}}>{m.remark}</td>
          </tr>))}</tbody>
        </table>
      </div>
    </div>
  </div>);
}

function WorkSteps({t}){
  const S=[
    {n:1,l:"รับ Ticket",d:"รับจาก Sales ผ่าน MS Forms · แจ้ง Engineer Lead, Associate & Service Manager"},
    {n:2,l:"Data Enrichment",d:`ดึงจาก SharePoint: Brand ${t.brand} · ${t.branch} · Contract active`},
    {n:3,l:"วางแผนและ Assign",d:`Assign ให้ ${t.assignee||"(ยังไม่ได้ assign)"}`},
    {n:4,l:"ยืนยันลูกค้า",d:`Call Status: ${t.callStatus==="confirmed"?"✅ ยืนยันแล้ว":"⏳ รอช่างยืนยัน"}`},
    {n:5,l:"On-site & FSR Draft",d:"ช่างเดินทางหน้างาน · ส่ง Field Service Report (draft)"},
    {n:6,l:"AM Review & Sign-off",d:"AM อนุมัติ FSR · ลูกค้าเซ็น · ส่ง email อัตโนมัติ"},
    {n:7,l:"Parts & Quotation",d:t.parts?"มีการเปลี่ยนอะไหล่ → สร้าง Quotation → Admin approve → ส่งลูกค้า":"ไม่มีการเปลี่ยนอะไหล่"},
    {n:8,l:"SAP Sync & Closure",d:"Push ข้อมูลไป SAP PM · AM/SM ปิดงาน"},
  ];
  const cur=t.step||1;
  return(<div className="st-tl">{S.map(s=>{const st=s.n<cur?"done":s.n===cur?"active":"pend";return(<div key={s.n} className="st-i"><div className="st-line"/><div className={`st-ic ${st}`}>{st==="done"?"✓":s.n}</div><div className="st-ct"><h4 style={{color:st==="active"?"#60a5fa":st==="done"?"#4ade80":"#94a3b8"}}>{s.l}</h4><p>{s.d}</p></div></div>);})}</div>);
}

function Workflow(){
  const [tks,setTks]=useState(initTickets),[sel,setSel]=useState(null),[newF,setNewF]=useState(false);
  const [form,setForm]=useState({title:"",customer:"",machine:"",brand:"",branch:"",priority:"medium",type:"Corrective"});
  const cols=["New Ticket","Planning","Confirmed","On-site","Review","Closed"];
  const colC={"New Ticket":"#475569","Planning":"#f59e0b","Confirmed":"#3b82f6","On-site":"#8b5cf6","Review":"#ec4899","Closed":"#22c55e"};
  function advance(tk,from){const idx=cols.indexOf(from);if(idx>=cols.length-1)return;const to=cols[idx+1];setTks(prev=>{const u={...prev};u[from]=u[from].filter(t=>t.id!==tk.id);u[to]=[...u[to],{...tk,step:Math.min((tk.step||1)+1,8),callStatus:to==="Confirmed"?"confirmed":tk.callStatus}];return u;});setSel(null);}
  function addTk(){const id=`TK-2026-0${Math.floor(Math.random()*900)+91}`;setTks(prev=>({...prev,"New Ticket":[{...form,id,assignee:null,step:1,callStatus:null,parts:false,date:"16.05.26"},...prev["New Ticket"]]}));setNewF(false);setForm({title:"",customer:"",machine:"",brand:"",branch:"",priority:"medium",type:"Corrective"});}
  const allTk=Object.values(tks).flat(),openTk=allTk.length-tks["Closed"].length;
  return(<div>
    <div className="ph"><h2>Service Tracking Workflow</h2><p>Kanban 8-step · Open: {openTk} tickets · Total: {allTk.length}</p></div>
    <div className="ca">
      <div style={{marginBottom:12,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <button className="btn btn-p" onClick={()=>setNewF(true)}>＋ New Ticket</button>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {Object.entries(tks).map(([col,items])=>(<span key={col} style={{fontSize:10,color:colC[col],background:"#111827",border:`1px solid ${colC[col]}30`,borderRadius:6,padding:"3px 8px"}}>{col}: <strong>{items.length}</strong></span>))}
        </div>
      </div>
      <div className="kanban">
        {cols.map(col=>(<div key={col} className="kcol">
          <div className="kcol-h"><span style={{color:colC[col]}}>{col}</span><span style={{fontSize:10,background:"#0f172a",color:"#64748b",borderRadius:8,padding:"1px 6px",fontWeight:700}}>{tks[col].length}</span></div>
          <div className="kcol-b">
            {tks[col].map(t=>(<div key={t.id} className="tk" onClick={()=>setSel({t,col})}>
              <div className="tk-id">{t.id}</div>
              <div className="tk-t">{t.title}</div>
              <div style={{marginBottom:3}}><PrioBdg p={t.priority}/></div>
              <div className="tk-m">👤 {t.customer.substring(0,22)}{t.customer.length>22?"…":""}</div>
              <div className="tk-m">📍 {t.branch}</div>
              {t.assignee&&<div className="tk-m" style={{color:"#60a5fa"}}>🔧 {t.assignee.split("(")[1]?.replace(")","")}</div>}
              {t.parts&&<div style={{marginTop:3}}><span className="badge by">⚙ Parts</span></div>}
            </div>))}
          </div>
        </div>))}
      </div>
    </div>
    {sel&&(<div className="mo" onClick={()=>setSel(null)}><div className="mb" onClick={e=>e.stopPropagation()}>
      <div className="mh"><div><div style={{fontSize:10,color:"#475569",fontFamily:"monospace"}}>{sel.t.id}</div><h3>{sel.t.title}</h3></div><button className="btn btn-g" style={{padding:"3px 8px"}} onClick={()=>setSel(null)}>✕</button></div>
      <div className="mbody">
        <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}><PrioBdg p={sel.t.priority}/><span className="badge bb">{sel.t.type}</span><Bdg type="purple" lbl={sel.t.brand}/>{sel.t.callStatus==="confirmed"&&<span className="badge bg">📞 Confirmed</span>}{sel.t.parts&&<span className="badge by">⚙ Parts</span>}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[["ลูกค้า",sel.t.customer],["เครื่อง",sel.t.machine],["สาขา",sel.t.branch],["Assign ให้",sel.t.assignee||"ยังไม่ได้ assign"],["วันที่รับงาน",sel.t.date],["Step ปัจจุบัน",`${sel.t.step}/8`]].map(([k,v])=>(<div key={k} style={{background:"#111827",borderRadius:7,padding:"7px 10px"}}><div style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:".4px",marginBottom:2}}>{k}</div><div style={{color:"#e2e8f0",fontSize:12,fontWeight:600}}>{v}</div></div>))}
        </div>
        <div style={{marginBottom:14}}><div style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:".5px",fontWeight:600,marginBottom:10}}>Workflow Progress</div><WorkSteps t={sel.t}/></div>
        {sel.col!=="Closed"&&(<div style={{display:"flex",gap:8,justifyContent:"flex-end",paddingTop:10,borderTop:"1px solid #334155"}}><button className="btn btn-g" onClick={()=>setSel(null)}>ปิด</button><button className="btn btn-p" onClick={()=>advance(sel.t,sel.col)}>Advance → {cols[cols.indexOf(sel.col)+1]}</button></div>)}
      </div>
    </div></div>)}
    {newF&&(<div className="mo" onClick={()=>setNewF(false)}><div className="mb" onClick={e=>e.stopPropagation()}>
      <div className="mh"><h3>New Service Ticket</h3><button className="btn btn-g" style={{padding:"3px 8px"}} onClick={()=>setNewF(false)}>✕</button></div>
      <div className="mbody">
        <div className="al al-i" style={{marginBottom:12}}>📋 Simulating MS Forms — จะแจ้งเตือน Engineer Lead + Associate + Service Manager</div>
        {[{k:"title",l:"รายละเอียดปัญหา",ph:"เช่น XERF ไม่มี output พลังงาน"},{k:"customer",l:"ชื่อลูกค้า / คลินิก",ph:"เช่น Mantra Clinic นครพนม"},{k:"machine",l:"ชื่อเครื่อง",ph:"เช่น XERF System Package"},{k:"brand",l:"แบรนด์",ph:"Lutronic, Cynosure, Venus..."},{k:"branch",l:"สาขา / ที่ตั้ง",ph:"เช่น ภูเก็ต, กรุงเทพฯ"}].map(f=>(<div key={f.k} className="fg"><label>{f.l}</label><input className="fi" placeholder={f.ph} value={form[f.k]} onChange={e=>setForm(p=>({...p,[f.k]:e.target.value}))}/></div>))}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div className="fg"><label>Priority</label><select className="fi" value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))}>{["critical","high","medium","low"].map(v=><option key={v} value={v}>{v.charAt(0).toUpperCase()+v.slice(1)}</option>)}</select></div>
          <div className="fg"><label>ประเภทงาน</label><select className="fi" value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}>{["Corrective","PM","Installation","Warranty"].map(v=><option key={v} value={v}>{v}</option>)}</select></div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",paddingTop:10,borderTop:"1px solid #334155"}}><button className="btn btn-g" onClick={()=>setNewF(false)}>ยกเลิก</button><button className="btn btn-s" onClick={addTk} disabled={!form.title||!form.customer}>Submit Ticket</button></div>
      </div>
    </div></div>)}
  </div>);
}

  const [page,setPage]=useState("overview");
  const nav=[
    {id:"overview",label:"Overview",icon:"▦"},
    {id:"machines",label:"Machine Inventory",icon:"🖥"},
    {id:"workflow",label:"Service Workflow",icon:"📋"},
  ];
  return(<div className="shell">
    <div className="sb">
      <div className="sb-logo">
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <div style={{width:26,height:26,borderRadius:7,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>A</div>
          <h1>AESLA</h1>
        </div>
        <p>Service Operations</p>
      </div>
      <div style={{padding:"10px 0"}}>
        {nav.map(n=>(<div key={n.id} className={`nav-item${page===n.id?" active":""}`} onClick={()=>setPage(n.id)}><span style={{fontSize:14}}>{n.icon}</span><span>{n.label}</span></div>))}
      </div>
      <div className="sb-sect">Integration</div>
      <div className="sb-status"><span className="dot dot-g"/><span>SAP PM</span></div>
      <div className="sb-status"><span className="dot dot-g"/><span>SharePoint API</span></div>
      <div className="sb-status"><span className="dot dot-y"/><span>MS Forms</span></div>
      <div className="sb-status"><span className="dot dot-b"/><span>Power Automate</span></div>
      <div className="sb-sect" style={{marginTop:8}}>Data Source</div>
      <div className="sb-status" style={{fontSize:10}}><span>ET technician.xlsx ✓</span></div>
      <div className="sb-status" style={{fontSize:10}}><span>Service Package Report ✓</span></div>
      <div className="sb-status" style={{fontSize:10}}><span>Summary 2026.xlsx ✓</span></div>
      <div className="sb-foot"><div style={{marginBottom:2,fontWeight:600}}>Oil Supasan</div><div>Service Manager · AESLA</div><div style={{marginTop:3,color:"#334155"}}>v2.0 · พ.ค. 2569</div></div>
    </div>
    <div className="main">
      {page==="overview"&&<Overview/>}
      {page==="machines"&&<Machines/>}
      {page==="workflow"&&<Workflow/>}
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
